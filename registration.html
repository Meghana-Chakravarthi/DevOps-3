<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Student Registration </h1>
    <div class = "regpage">
        <form autocomplete="on">
            <!-- Name -->
            <div class="field-row">
                <label for ="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required>
            </div>
            <div class="field-row">
                <label for ="mname">Middle Name:</label>
                <input type="text" id="mname" name="mname">
            </div>
            <div class="field-row">
                <label for ="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" required>
            </div>
            <!-- Class -->
             <div class="field-row radio-row">
                <label for="class">Class:</label>
                <div class="radio-options">
                    <input type="radio" id="csea" name="class" value="csea" required>
                    <label for="csea">CSE-A</label>
                    <input type="radio" id="cseb" name="class" value="cseb">
                    <label for="cseb">CSE-B</label>
                    <input type="radio" id="csec" name="class" value="csec">
                    <label for="csec">CSE-C</label>
                    <input type="radio" id="csed" name="class" value="csed">
                    <label for="csed">CSE-D</label>
                    <input type="radio" id="csee" name="class" value="csee">
                    <label for="csee">CSE-E</label> 
                    <label for="csef">CSE-F</label>
                    <input type="radio" id="csef" name="class" value="csef">
                </div>
            </div>
            <!-- Gender -->
             <div class="field-row radio-row">
                    <label>Gender:</label>
                    <div class="radio-options">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                        <input type="radio" id="other" name="gender" value="other">
                        <label for="other">Other</label>
                    </div>
                </div>
                <!-- email & password -->
                 <div class="field-row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field-row">
                    <label for="password">Password:</label>
                    <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:220px;">
                        <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}" title="Use at least 8 characters with letters and numbers" required style="flex:1;">
                        <button type="button" id="togglePassword" style="padding:10px 14px; border:1px solid #b7c4db; border-radius:8px; background:#ffffff; cursor:pointer; color:#1f3f6e; font-weight:600;">Show</button>
                    </div>
                </div>
        </form>
    </div>
</body>
</html>
