<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
            body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 40px 0;
    background: #a9bee0;
}

h1 {
    text-align: center;
    color: #1c3d72;
    margin-bottom: 25px;
    font-size: 32px;
}

.regpage {
    width: 850px;
    max-width: 95%;
    margin: auto;
    padding: 35px;
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

form {
    display: grid;
    gap: 18px;
}

.field-row {
    display: flex;
    align-items: center;
    gap: 20px;
}

.field-row label:first-child {
    width: 180px;
    text-align: right;
    font-weight: 600;
    color: #2c3e50;
}

.field-row input,
.field-row textarea,
.field-row select {
    flex: 1;
    padding: 12px;
    border: 1px solid #768eb5;
    border-radius: 8px;
    font-size: 15px;
    transition: 0.3s;
    background: #fff;
}

.field-row input:focus,
.field-row textarea:focus {
    border-color: #1e43b1;
    box-shadow: 0 0 8px rgba(51,102,255,0.25);
    outline: none;
}

.field-row textarea {
    min-height: 100px;
    resize: vertical;
}

.radio-row {
    align-items: center;
}

.radio-options {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
}

.radio-options input[type="radio"] {
    margin: 0;
    transform: scale(1.1);
}

.radio-options label {
    margin: 0;
    font-weight: 500;
    color: #333;
}

input[type="submit"] {
    margin-top: 20px;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #314b9b;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

input[type="submit"]:hover {
    background: #0f2c82;
}

input[type="submit"]:active {
    transform: scale(0.98);
}

@media (max-width: 768px) {
    .field-row {
        flex-direction: column;
        align-items: flex-start;
    }

    .field-row label:first-child {
        width: 100%;
        text-align: left;
    }

    .radio-options {
        width: 100%;
    }
}
        </style>
</head>
<body>
    <h1> Student Registration </h1>
    <div class = "regpage">
        <form autocomplete="on">
            <!-- Name -->
            <div class="field-row">
                <label for ="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required>
            </div>
            <div class="field-row">
                <label for ="mname">Middle Name:</label>
                <input type="text" id="mname" name="mname">
            </div>
            <div class="field-row">
                <label for ="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" required>
            </div>
            <!-- Class -->
             <div class="field-row radio-row">
                <label for="class">Class:</label>
                <div class="radio-options">
                    <input type="radio" id="csea" name="class" value="csea" required>
                    <label for="csea">CSE-A</label>
                    <input type="radio" id="cseb" name="class" value="cseb">
                    <label for="cseb">CSE-B</label>
                    <input type="radio" id="csec" name="class" value="csec">
                    <label for="csec">CSE-C</label>
                    <input type="radio" id="csed" name="class" value="csed">
                    <label for="csed">CSE-D</label>
                    <input type="radio" id="csee" name="class" value="csee">
                    <label for="csee">CSE-E</label> 
                    <label for="csef">CSE-F</label>
                    <input type="radio" id="csef" name="class" value="csef">
                </div>
            </div>
            <!-- Gender -->
             <div class="field-row radio-row">
                    <label>Gender:</label>
                    <div class="radio-options">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                        <input type="radio" id="other" name="gender" value="other">
                        <label for="other">Other</label>
                    </div>
                </div>
                <!-- email & password -->
                 <div class="field-row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field-row">
                    <label for="password">Password:</label>
                    <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:220px;">
                        <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}" title="Use at least 8 characters with letters and numbers" required style="flex:1;">
                        <button type="button" id="togglePassword" style="padding:10px 14px; border:1px solid #b7c4db; border-radius:8px; background:#ffffff; cursor:pointer; color:#1f3f6e; font-weight:600;">Show</button>
                    </div>
                </div>
                <div class="field-row">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="field-row">
                    <label for="phno">Phone Number:</label>
                    <input type="tel" id="phno" name="phno" pattern="[0-9]{10}" title="Enter a 10-digit phone number" required>
                </div>
                <div class="field-row">
                    <label for="pfname">Father Name:</label>
                    <input type="text" id="pfname" name="pfname" required>
                </div>
                <div class="field-row">
                    <label for="focc">Father Occupation:</label>
                    <input type="text" id="focc" name="focc" required>
                </div>
                <div class="field-row">
                    <label for="femail">Father Email:</label>
                    <input type="email" id="femail" name="femail" required>
                </div>
                <div class="field-row">
                    <label for="fphno">Father Phone Number:</label>
                    <input type="tel" id="fphno" name="fphno" pattern="[0-9]{10}" title="Enter a 10-digit phone number" required>
                </div>
                <div class="field-row">
                    <label for="pmname">Mother Name:</label>
                    <input type="text" id="pmname" name="pmname" required>
                </div>
                <div class="field-row">
                    <label for="mocc">Mother Occupation:</label>
                    <input type="text" id="mocc" name="mocc" required>
                </div>
                <div class="field-row">
                    <label for="memail">Mother Email:</label>
                    <input type="email" id="memail" name="memail" required>
                </div>
                <div class="field-row">
                    <label for="mphno">Mother Phone Number:</label>
                    <input type="tel" id="mphno" name="mphno" pattern="[0-9]{10}" title="Enter a 10-digit phone number" required>
                </div>
                <div class="field-row">
                    <label for="address">Address:</label>
                    <textarea id="address" name="address" required></textarea>
                </div>
                <input type="submit" value="Register">
            </form>
        </div>
        <!-- </form> -->
    </div>
    <script>
            const passwordInput = document.getElementById('password');
            const toggleButton = document.getElementById('togglePassword');

            toggleButton.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleButton.textContent = isPassword ? 'Hide' : 'Show';
            });
        </script>
</body>
</html>
